<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduation Ceremony</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
        }
      
        <img src="invitation.jpeg" alt="Graduation Invitation" style="width:100%; max-width:800px; display:block; margin:auto;">

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
            position: fixed;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #34495e;
        }
        /* Main Content */
        .content {
            margin-left: 250px;
            padding: 20px;
            text-align: center;
            flex-grow: 1;
        }
        /* Hide all sections except the default one */
        .section {
            display: none;
        }
        .active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <a href="#" onclick="showSection('poster')">Invitation</a>
        <a href="#" onclick="showSection('rsvp')">RSVP</a>
        <a href="#" onclick="showSection('directions')">Directions</a>
        <a href="#" onclick="showSection('admin')">Admin Login</a>
    </div>

    <!-- Main Content -->
    <div class="content">
        <!-- Invitation Poster Section -->
        <div id="poster" class="section active">
            <img src="invitation.jpeg" alt="Graduation Invitation" style="width: 100%; max-width: 600px;">
        </div>
        
        <!-- RSVP Section -->
        <div id="rsvp" class="section">
            <h2>RSVP</h2>
            <form id="rsvp-form">
                <label for="student-name">Student's Name:</label>
                <input type="text" id="student-name" required><br><br>
                <label for="num-people">Number of Guests:</label>
                <input type="number" id="num-people" min="1" required><br><br>
                <button type="submit">Submit RSVP</button>
            </form>
        </div>
        
        <!-- Directions Section -->
        <div id="directions" class="section">
            <h2>Directions</h2>
            <p><a href="https://moovitapp.com/" target="_blank">Get Directions with Moovit</a></p>
            <p><a href="https://www.waze.com/" target="_blank">Get Directions with Waze</a></p>
        </div>
        
        <!-- Admin Login Section -->
        <div id="admin" class="section">
            <h2>Admin Login</h2>
            <input type="password" id="admin-password" placeholder="Enter Password">
            <button onclick="checkAdmin()">Login</button>
            <div id="admin-panel" style="display: none;">
                <h3>RSVP Responses</h3>
                <ul id="rsvp-list"></ul>
            </div>
        </div>
    </div>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }
    </script>
</body>
</html>
