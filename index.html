<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduation Ceremony</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        h1 { color: #2c3e50; }
        .info { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Welcome to Our Graduation Ceremony</h1>
    <p>Date: 23 May 2025</p>
    <p>Time: 10:30 AM to 1:30 PM</p>
    <p>Location:
        Bezalel Academy of Arts and Design Jerusalem 
        1 Zmora Street, Jerusalem, 9515701</p>
    
    <div class="info">
        <h2>Directions</h2>
        <p><a href="https://moovitapp.com/" target="_blank">Get Directions with Moovit</a></p>
        <p><a href="https://www.waze.com/" target="_blank">Get Directions with Waze</a></p>
    </div>

    <!-- ✅ RSVP Form -->
    <div class="rsvp-form">
        <h2>RSVP</h2>
        <form id="rsvp-form">
            <label for="student-name">Student's Name:</label>
            <input type="text" id="student-name" name="studentName" required><br><br>

            <label for="num-people">Number of Guests:</label>
            <input type="number" id="num-people" name="numPeople" required min="1"><br><br>

            <label for="dietary-restrictions">Dietary Restrictions (Vegan, Gluten-Free, etc.):</label>
            <input type="text" id="dietary-restrictions" name="diet"><br><br>

            <label for="allergies">Allergies (if any):</label>
            <input type="text" id="allergies" name="allergies"><br><br>

            <label for="accessibility">Special Accessibility Needs (if any):</label>
            <input type="text" id="accessibility" name="accessibility"><br><br>

            <button type="submit">Submit RSVP</button>
        </form>
    </div>

    <!-- ✅ JavaScript at the bottom -->
    <script src="script.js" type="module"></script>
</body>
</html>
